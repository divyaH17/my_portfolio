<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ATM Receipt</title>
    <style>
        body {
            background: linear-gradient(135deg, #f9c5d1, #fbc8e7);
            font-family: "Courier New", monospace;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .receipt {
            background: #ffffff;
            width: 380px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
            padding: 20px;
            border: 2px dashed #ddd;
        }

        .center {
            text-align: center;
        }

        h2 {
            margin: 0;
            letter-spacing: 2px;
        }

        .timestamp {
            font-size: 12px;
            color: #666;
            margin-top: 5px;
        }

        hr {
            border: none;
            border-top: 1px dashed #ccc;
            margin: 15px 0;
        }

        .details p {
            display: flex;
            justify-content: space-between;
            margin: 8px 0;
            font-size: 14px;
        }

        .details span {
            font-weight: bold;
        }

        .balance {
            font-size: 15px;
            color: #0a7d3b;
        }

        .footer {
            font-size: 13px;
            margin-top: 10px;
        }

        button {
            width: 100%;
            margin-top: 15px;
            padding: 10px;
            font-size: 14px;
            background: #ff6fae;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }

        button:hover {
            background: #ff4f9a;
        }

        @media print {
            body {
                background: none;
            }
            button {
                display: none;
            }
            .receipt {
                box-shadow: none;
                border: none;
            }
        }
    </style>
</head>
<body>

    <div class="receipt">
        <div class="center">
            <h2>BANK OF INDIA ATM</h2>
            <div class="timestamp">{{ details.timestamp }}</div>
        </div>

        <hr>

        <div class="details">
            <p><span>Account</span> {{ details.account_number }}</p>
            <p><span>Transaction</span> {{ details.transaction_type }}</p>
            <p><span>Amount</span> ₹{{ "%.2f"|format(details.amount) }}</p>
        </div>

        <hr>

        <div class="details balance">
            <p><span>New Balance</span> ₹{{ "%.2f"|format(details.new_balance) }}</p>
        </div>

        <hr>

        <div class="center footer">
            <p>THANK YOU FOR BANKING WITH US</p>
            <p>Have a nice day</p>
        </div>

        <button onclick="window.print()">🖨 Print Receipt</button>
    </div>

</body>
</html>
