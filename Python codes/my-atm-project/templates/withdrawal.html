<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ATM Withdrawal</title>

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #f9c5d1, #fbc8e7);
            font-family: "Poppins", sans-serif;
        }

        .container {
            background: #ffffff;
            width: 380px;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.15);
            text-align: center;
        }

        h1 {
            margin-bottom: 20px;
            color: #333;
            letter-spacing: 1px;
        }

        label {
            display: block;
            text-align: left;
            margin-bottom: 6px;
            font-weight: 500;
            color: #555;
        }

        input[type="password"],
        input[type="number"] {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #ccc;
            font-size: 15px;
            outline: none;
            transition: border 0.3s;
        }

        input[type="password"]:focus,
        input[type="number"]:focus {
            border-color: #f48fb1;
        }

        .field {
            margin-bottom: 18px;
        }

        input[type="submit"] {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 25px;
            background: linear-gradient(135deg, #f48fb1, #ce93d8);
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        input[type="submit"]:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
        }

        .message {
            margin-bottom: 15px;
            color: red;
            font-weight: 500;
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>ATM Withdrawal</h1>

        {% if message %}
            <div class="message">{{ message }}</div>
        {% endif %}

        <form method="POST" action="/">
            <div class="field">
                <label for="pin">ENTER PIN</label>
                <input type="password" id="pin" name="pin" required>
            </div>

            <div class="field">
                <label for="amount">ENTER AMOUNT</label>
                <input type="number" id="amount" name="amount" required>
            </div>

            <input type="submit" value="Withdraw">
        </form>
    </div>

</body>
</html>
